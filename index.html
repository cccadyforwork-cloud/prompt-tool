<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>通用产品提示词工具</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="side-panel">
        <div class="brand-block">
          <p class="eyebrow">Prompt Generator</p>
          <h1>通用产品提示词生成工具</h1>
          <p>输入采购单、供应商资料和竞品参考，选择模板后生成当前产品图组提示词。</p>
        </div>

        <section class="control-group" aria-labelledby="source-title">
          <h2 id="source-title">资料输入</h2>
          <label for="purchaseFile">采购单 PDF</label>
          <input id="purchaseFile" class="source-file" type="file" accept=".pdf,application/pdf">

          <label for="purchaseImageFile">采购单图片</label>
          <input id="purchaseImageFile" class="source-file" type="file" accept="image/png,image/jpeg,image/webp,.png,.jpg,.jpeg,.webp">

          <label for="supplierFile">1688 HTML 文件（可多选）</label>
          <input id="supplierFile" class="source-file" type="file" accept=".html,.htm,text/html" multiple>

          <label for="competitorFile">竞品链接 HTML 文件（可多选）</label>
          <input id="competitorFile" class="source-file" type="file" accept=".html,.htm,text/html" multiple>

          <button id="extractSources" type="button" class="secondary">解析资料并提取产品信息</button>
          <p id="extractStatus" class="status" role="status" aria-live="polite"></p>
        </section>

        <section class="control-group" aria-labelledby="sku-title">
          <h2 id="sku-title">产品选择</h2>
          <label for="skuSelect">选择产品 / 款式</label>
          <select id="skuSelect"></select>

          <label for="templateSelect">选择模板</label>
          <select id="templateSelect"></select>
        </section>

        <section class="control-group" aria-labelledby="product-params-title">
          <h2 id="product-params-title">产品主参数</h2>
          <div id="productParamList" class="product-param-list"></div>
        </section>

        <section class="control-group" aria-labelledby="override-title">
          <h2 id="override-title">可替换参数</h2>
          <div id="fieldList" class="field-list"></div>
        </section>

        <section class="control-group compact" aria-labelledby="actions-title">
          <h2 id="actions-title">操作</h2>
          <button id="copyCurrent" type="button">复制当前产品全部图组</button>
          <button id="resetFields" type="button" class="ghost">恢复已提取参数</button>
          <p id="copyStatus" class="status" role="status" aria-live="polite"></p>
        </section>
      </aside>

      <section class="workspace">
        <div class="top-strip">
          <div>
            <p class="eyebrow">Source Digest</p>
            <h2 id="currentTitle">产品资料提炼</h2>
          </div>
          <div class="badge-row" id="badges"></div>
        </div>
        <div id="sourceSummary" class="source-summary" aria-label="资料来源摘要"></div>

        <section class="product-prompt-panel" aria-labelledby="product-prompts-title">
          <div class="section-header">
            <div>
            <p class="eyebrow">Product Outputs · template-level-specs</p>
              <h2 id="product-prompts-title">当前产品图组</h2>
            </div>
            <p>只展示当前产品与当前模板下的图组；每张图可单独复制。</p>
          </div>
          <div id="productPromptGrid" class="product-prompt-grid"></div>
        </section>
      </section>
    </main>

    <script src="./vendor/pdfjs/pdf.min.js"></script>
    <script src="./app.js?v=20260620-compact-prompts"></script>
  </body>
</html>
